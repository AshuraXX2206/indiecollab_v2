<!doctype html>
<html lang="vi" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================================
         PRIMARY SEO META TAGS
         ============================================================ -->
    <title>IndieCollab — Nền tảng cộng tác cho Indie Game Developers</title>
    <meta name="description" content="IndieCollab kết nối indie game developers, pixel artists, sound designers và creators. Tìm đồng đội, đăng dự án, săn bug bounty và cùng nhau ship game." />
    <meta name="keywords" content="indie game, game developer, pixel art, unity, godot, game jam, collab, indie collab, game dev vietnam, làm game độc lập, tìm đồng đội, cộng tác game" />
    <meta name="author" content="IndieCollab" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://indiecollab.onrender.com/" />

    <!-- ============================================================
         OPEN GRAPH — Facebook, Discord, LinkedIn sharing
         ============================================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="IndieCollab" />
    <meta property="og:title" content="IndieCollab — Nền tảng cộng tác cho Indie Game Developers" />
    <meta property="og:description" content="Tìm đồng đội, đăng dự án game, săn bug bounty và cùng nhau ship game. Cộng đồng indie developers Việt Nam và thế giới." />
    <meta property="og:url" content="https://indiecollab.onrender.com/" />
    <meta property="og:image" content="https://indiecollab.onrender.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="IndieCollab — Indie Game Developer Collaboration Platform" />
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- ============================================================
         TWITTER / X CARDS
         ============================================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IndieCollab — Indie Game Dev Collaboration Platform" />
    <meta name="twitter:description" content="Find teammates, post projects, hunt bug bounties, and ship your indie game together." />
    <meta name="twitter:image" content="https://indiecollab.onrender.com/og-image.png" />
    <meta name="twitter:image:alt" content="IndieCollab Platform Preview" />

    <!-- ============================================================
         FAVICON & APP ICONS
         ============================================================ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="msapplication-TileColor" content="#4f46e5" />

    <!-- ============================================================
         STRUCTURED DATA — JSON-LD for Google rich results
         ============================================================ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "IndieCollab",
      "url": "https://indiecollab.onrender.com/",
      "description": "Nền tảng cộng tác cho indie game developers, pixel artists, sound designers. Tìm đồng đội, đăng dự án và cùng ship game.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "IndieCollab",
        "url": "https://indiecollab.onrender.com/"
      },
      "keywords": "indie game, game developer, pixel art, unity, godot, game jam, collab"
    }
    </script>

    <!-- ============================================================
         CONTENT SECURITY POLICY
         Covers Firebase, Google Translate (incl. gstatic + translate-pa),
         Google Fonts, DiceBear avatars, and self-hosted assets.
         ============================================================ -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval'
        https://translate.google.com
        https://translate.googleapis.com
        https://translate-pa.googleapis.com
        https://apis.google.com
        https://*.firebaseio.com
        https://*.googleapis.com;
      style-src 'self' 'unsafe-inline'
        https://fonts.googleapis.com
        https://translate.googleapis.com
        https://www.gstatic.com;
      font-src 'self'
        https://fonts.gstatic.com
        https://www.gstatic.com;
      img-src 'self' data: blob:
        https://*.googleapis.com
        https://*.gstatic.com
        https://api.dicebear.com
        https://*.unsplash.com
        https://*.githubusercontent.com
        https://*.googleusercontent.com
        https://lh3.googleusercontent.com;
      connect-src 'self'
        https://*.firebaseio.com
        wss://*.firebaseio.com
        https://*.googleapis.com
        https://*.firebaseapp.com
        https://api.dicebear.com
        https://api.ipify.org
        https://translate-pa.googleapis.com;
      frame-src 'self'
        https://translate.google.com
        https://translate.googleapis.com;
      object-src 'none';
      base-uri 'self';
    " />

    <!-- ============================================================
         PERFORMANCE — Preconnect to critical third-party origins
         Reduces DNS lookup + TLS handshake latency for Firebase,
         Google APIs, and DiceBear avatar service.
         ============================================================ -->
    <!-- RFC 8288 Agent Discovery Links -->
    <link rel="api-catalog" href="/.well-known/api-catalog" type="application/linkset+json" />
    <link rel="https://a2a-protocol.org/agent-card" href="/.well-known/agent-card.json" type="application/json" />

    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://securetoken.googleapis.com" />
    <link rel="preconnect" href="https://api.dicebear.com" />
    <link rel="preconnect" href="https://translate.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://translate.google.com" />
    <link rel="dns-prefetch" href="https://translate-pa.googleapis.com" />

    <!-- Google Translate: hide default banner and branding UI.
         We use our own LanguageSelector component instead. -->
    <style>
      /* Hide the default Google Translate top banner */
      .goog-te-banner-frame { display: none !important; }
      html, body {
        background-color: #020617 !important;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        width: 100%;
      }
      body { top: 0 !important; }
      /* Hide the default Google Translate widget dropdown */
      #google_translate_element { 
        position: fixed; 
        bottom: -9999px; 
        left: -9999px; 
        visibility: hidden; 
        height: 0; 
        overflow: hidden;
      }
      /* Remove Google Translate highlight styling on translated text */
      .goog-te-menu-value span,
      font[style] { font-size: inherit !important; }
      .VIpgJd-ZVi9od-l4eHX-hSRGPd { display: none !important; }
      .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; }
      /* Hide Google Translate feedback / rating bar */
      .goog-te-ftab-float { display: none !important; }
      .goog-te-ftab { display: none !important; }
      #goog-gt-tt { display: none !important; }
      .goog-tooltip { display: none !important; }
      .goog-tooltip:hover { display: none !important; }
      .goog-te-balloon-frame { display: none !important; }
      div#goog-gt- { display: none !important; }
      .VIpgJd-yAWNEb-VIpgJd-fmcmS-sn54Q { display: none !important; }
      .VIpgJd-yAWNEb-hvhgNd { display: none !important; }
      /* Hide the white feedback panel at bottom */
      iframe.VIpgJd-ZVi9od-aZ2wEe { display: none !important; }
      .goog-te-spinner-pos { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate hidden widget — our custom LanguageSelector controls it -->
    <div id="google_translate_element"></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'vi',
          includedLanguages: 'en,ja,ko,zh-CN,zh-TW,th,fr,de,es,pt,ru,id,ar,hi',
          autoDisplay: false,
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
